########################################
# Basic Configuration
########################################

menu:
  - name: home
    url: ""
    icon:
  - name: archives
    url: "archives"
    icon:
  - name: about
    url: "about"
    icon:

mainSections: ["post"]
yearFormat: "2006"
monthFormat: "2006-01"
dateFormat: "2006-01-02"
timeFormat: "2006-01-02 15:04:05"

author: YOUR_NAME
email: your@email.com
description: "欢迎来到我的学术主页"
subtitle:
  typing:
    enable: true
    strings:
      - 研究者 / Researcher
      - 探索者 / Explorer
    typeSpeed: 100
    backSpeed: 50
    backDelay: 2000
    startDelay: 300
    loop: true
    shuffle: false
    showCursor: true
    cursorChar: "|"
    smartBackspace: false
  text: "欢迎来到我的学术主页"

banner: "images/banner.webp"

banner_srcset:
  enable: false

avatar: "avatar.webp"

cover:

toc: true

open_graph:
  enable: true

excerpt_link: 阅读更多

copyright:

footer:
  since: 2025
  powered: true
  count: true
  busuanzi: false
  icon:
    url: "../images/taichi.png"
    rotate: true
    mask: true

sidebar:
  position: right
  menu: true
  article:
    show_common: true

social:
  github: https://github.com/YOUR_USERNAME
  # email: mailto:your@email.com
  # linkedin: https://www.linkedin.com/in/yourname
  # twitter: https://twitter.com/yourname
  # google_scholar: https://scholar.google.com/citations?user=XXXX

widgets:
  - category
  - tag
  - recent_posts

category_limits: 10
tag_limits: 10
recent_posts_limits: 5
tagcloud_limits: 20

only_show_capsule_in_index: false
uppercase_capsule: true

show_update_time: true

summary:
  enable: true
  style: 'subtitle'

rss:
  limit: 10
  showFullContent: false
  showCopyright: false

sort_order:
  taxonomy:
    category: date-reverse
    tag: date-reverse
  archive: date-reverse
  home: default

########################################
# CSS
########################################

layout:
  max_width: 1350px

triangle_badge:
  enable: false

reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/reimu-cursor-default.png
    pointer: ../images/cursor/reimu-cursor-pointer.png
    text: ../images/cursor/reimu-cursor-text.png

icon_font: 4552607_4k4bc36ef96

font:
  enable: true
  article:
    - Mulish
    - Noto Serif SC
  code:

local_font:
  article:
    - "-apple-system"
    - PingFang SC
    - Microsoft YaHei
    - sans-serif
  code:
    - Menlo
    - Monaco
    - Consolas
    - monospace

dark_mode:
  enable: auto

########################################
# Markdown Display
########################################

mermaid:
  zoom: false

code_block:
  expand: true

clipboard:
  success:
    en: Copy successfully (*^▽^*)
    zh-CN: 复制成功 (*^▽^*)
  fail:
    en: Copy failed (ﾟ⊿ﾟ)ﾂ
    zh-CN: 复制失败 (ﾟ⊿ﾟ)ﾂ
  copyright:
    enable: false
    count: 50
    license_type: by-nc-sa

math:
  katex:
    enable: true
  mathjax:
    enable: false

########################################
# Comment system
########################################

comment:
  title:
    en: Leave a comment
    zh-CN: 说些什么吧！
  default: waline

valine:
  enable: false

waline:
  enable: false
  serverURL:

twikoo:
  enable: false

gitalk:
  enable: false

giscus:
  enable: false

disqus:
  enable: false

########################################
# Animation
########################################

preloader:
  enable: true
  text:
    zh-CN: 少女祈祷中...
    en: Loading...
  icon:
  rotate: true

animation:
  enable: true
  options:
    header:
      title: slide-up
      subTitle: slide-down
    home:
      post: fade-up
      widget: fade-up
      sidebar: fade-up
    article:
      whole: fade-up
      date: zoom-in
      category: zoom-in
      tag: zoom-in
      comment: zoom-in
      reading: zoom-in
      nav: fade-up
    archive:
      whole: fade-up
      tag: zoom-in
      category: zoom-in
      section: fade-up
      nav: fade-up

firework:
  enable: false

########################################
# Extended features
########################################

article_copyright:
  enable: false
  content:
    author: true
    link: true
    title: false
    date: false
    updated: false
    license: true
    license_type: by-nc-sa

top:
  enable: true
  position: right
  icon:
    url: "../images/taichi.png"
    rotate: true
    mask: true

outdate:
  enable: true
  daysAgo: 365
  message:
    en: This article was last updated on {time}. Please note that the content may no longer be applicable.
    zh-CN: 本文最后更新于 {time}，请注意文中内容可能已不适用。

pace:
  enable: true

pangu:
  enable: false
